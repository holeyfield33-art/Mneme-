services:
  - type: web
    name: aletheia-mneme
    env: python
    buildCommand: pip install -r aletheia-mneme/requirements.txt
    startCommand: cd aletheia-mneme && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RELAY_SECRET
        sync: false
      - key: PERSONAL_MODE
        value: false
